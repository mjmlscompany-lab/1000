<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000x1000 꽉 찬 변환기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 30px; background: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        #drop-zone { 
            border: 3px dashed #2ecc71; padding: 60px; margin: 20px auto; 
            cursor: pointer; background: white; border-radius: 20px;
            transition: all 0.3s;
        }
        #drop-zone:hover { background: #e8faf0; border-color: #27ae60; }
        #status { font-weight: bold; color: #27ae60; margin: 10px 0; font-size: 1.2em; }
        #result-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; margin-top: 30px; 
        }
        .preview-box { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 11px; }
        .preview-box img { width: 100%; border-radius: 4px; border: 1px solid #eee; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1> 📷바코드 규격화 시스템</h1>
    <p>이미지를 1000x1000 JPG로 변환합니다.</p>

    <div id="drop-zone">사진을 드래그하거나 클릭하세요 (여러 장 가능)</div>
    <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
    
    <div id="status"></div>
    <div id="result-container"></div>
</div>

<canvas id="canvas" width="1000" height="1000"></canvas>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const resultContainer = document.getElementById('result-container');
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
    fileInput.onchange = (e) => handleFiles(e.target.files);

    async function handleFiles(files) {
        const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
        if (imageFiles.length === 0) return;

        status.innerText = "⏳ 꽉 채우는 중...";
        resultContainer.innerHTML = '';
        const zip = new JSZip();

        for (let i = 0; i < imageFiles.length; i++) {
            const file = imageFiles[i];
            const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            
            const blob = await processImageFill(file);
            const url = URL.createObjectURL(blob);

            const previewDiv = document.createElement('div');
            previewDiv.className = 'preview-box';
            previewDiv.innerHTML = `<img src="${url}"><br><span>${baseName}.jpg</span>`;
            resultContainer.appendChild(previewDiv);

            if (imageFiles.length === 1) {
                const link = document.createElement('a');
                link.href = url;
                link.download = `${baseName}.jpg`;
                link.click();
            } else {
                zip.file(`${baseName}.jpg`, blob);
            }
        }

        if (imageFiles.length >= 2) {
            status.innerText = "📦 압축 파일 생성 중...";
            const content = await zip.generateAsync({type: "blob"});
            const zipLink = document.createElement('a');
            zipLink.href = URL.createObjectURL(content);
            zipLink.download = "converted_images.zip";
            zipLink.click();
        }
        status.innerText = `✅ 변환 완료!`;
    }

    function processImageFill(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    // 1000x1000 캔버스 준비
                    ctx.clearRect(0, 0, 1000, 1000);

                    // 꽉 채우기 위한 계산 (Cover 방식)
                    let scale = Math.max(1000 / img.width, 1000 / img.height);
                    let w = img.width * scale;
                    let h = img.height * scale;
                    let x = (1000 - w) / 2;
                    let y = (1000 - h) / 2;

                    ctx.drawImage(img, x, y, w, h);
                    
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, "image/jpeg", 0.95);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
